<a name=".h0"></a><h2>Instant</h2>
An Instant is a point on a <span class="wiki-link"><a href="TimeLine.html">TimeLine</a></span>. The distance between two points on the same timeline is a Duration. If time points are on different timelines then the duration between the points is only meaningful if their timelines are related by a <span class="wiki-link"><a href="TimeLine.html#timelineMap">TimeLineMap</a></span>.<br />
