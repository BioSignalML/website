<a name=".h0"></a><h2>Stream Interface</h2>
<a name=".h21"></a><h3>Adding signal data</h3>
Existing signal data can not be modified. Instead signal chunks (or segments) are appended to an existing signal. The start time of a chunk (segment) will determine if the signal is discontinuous in time.<br />
